[package]
name = "server"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "server"
path = "src/main.rs"

[dependencies]
axum = { version = "0.8", features = ["ws"] }
aws-config = "1"
aws-credential-types = "1"
bytes = "1"
firecracker-manager = { path = "../firecracker-manager" }
futures = "0.3"
serde_json = "1"
terminal-bridge = { path = "../terminal-bridge" }
tokio = { version = "1", features = ["full"] }
uuid = { version = "1", features = ["v4"] }
