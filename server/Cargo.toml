[package]
name = "server"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "server"
path = "src/main.rs"

[dependencies]
anyhow = "1"
async-trait = "0.1"
axum = { version = "0.8", features = ["ws"] }
aws-config = "1"
aws-credential-types = "1"
bytes = "1"
firecracker-manager = { path = "../firecracker-manager" }
futures = "0.3"
russh = "0.46"
russh-keys = "0.46"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
uuid = { version = "1", features = ["v4"] }
